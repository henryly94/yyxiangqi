name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon=icon.ico --name "YY-Xiangqi" main.py
        
    - name: Create Release Archive
      run: |
        Compress-Archive -Path dist/YY-Xiangqi/* -DestinationPath YY-Xiangqi-Windows.zip
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YY-Xiangqi-Windows
        path: YY-Xiangqi-Windows.zip

    - name: Upload Release Asset
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: YY-Xiangqi-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
